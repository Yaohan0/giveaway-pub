<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="form-page">
    <div class="form-card">
      <div class="auth-top-links">
        <a href="index.html">&larr; Back to Home</a>
      </div>

      <h2>Verify Email</h2>

      <p class="auth-helper">
        Enter the 6-digit OTP sent to:
      </p>

      <input type="email" id="email" readonly />

      <div class="button-row">
        <button type="button" id="sendOtpBtn">Resend OTP</button>
      </div>

      <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" />

      <div class="button-row">
        <button type="button" id="verifyOtpBtn">Verify OTP</button>
      </div>

      <p id="msg"></p>

      <p class="auth-switch">
        Wrong email?
        <a href="register.html">Go back to register</a>
      </p>
    </div>
  </main>

  <script>
    const msg = document.getElementById("msg");
    const emailInput = document.getElementById("email");
    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");

    const params = new URLSearchParams(window.location.search);
    const emailFromQuery = params.get("email") || "";

    emailInput.value = emailFromQuery;

    function setMessage(text, isError = false) {
      msg.textContent = text;
      msg.style.color = isError ? "#fca5a5" : "#d1fae5";
    }

    sendOtpBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();

      if (!email) {
        setMessage("Missing email. Please go back and register again.", true);
        return;
      }

      sendOtpBtn.disabled = true;
      setMessage("Resending OTP...");

      try {
        const res = await fetch("/api/send-email-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.error || "Failed to resend OTP.", true);
          return;
        }

        setMessage(data.message || "OTP resent to email.");
      } catch (err) {
        console.error(err);
        setMessage("Failed to resend OTP.", true);
      } finally {
        sendOtpBtn.disabled = false;
      }
    });

    verifyOtpBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const otp = document.getElementById("otp").value.trim();

      if (!email || !otp) {
        setMessage("Enter both email and OTP.", true);
        return;
      }

      verifyOtpBtn.disabled = true;
      setMessage("Verifying OTP...");

      try {
        const res = await fetch("/api/verify-email-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.error || "Failed to verify OTP.", true);
          return;
        }

        setMessage(data.message || "Email verified successfully.");
        setTimeout(() => {
          window.location.href = "/";
        }, 900);
      } catch (err) {
        console.error(err);
        setMessage("Failed to verify OTP.", true);
      } finally {
        verifyOtpBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
